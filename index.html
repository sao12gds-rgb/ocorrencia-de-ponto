<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>OCORRÊNCIA DE PONTO</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
    color:#000;
}

.container{
    max-width:900px;
    margin:auto;
    text-align:left;
}

.ficha{
    width:210mm;
    min-height:297mm;
    margin:auto;
    background:#fff;
    padding:18mm 10mm 20mm 10mm;
    border:1px solid #ccc;
    position:relative;
}

.topo{
    position:relative;
    min-height:90px;
    margin-bottom:10px;
}

.logo-box{
    position:absolute;
    top:0;
    left:0;
    width:150px;
    height:90px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    overflow:hidden;
}

.logo-box img{
    max-width:115px;
    max-height:80px;
    width:auto;
    height:auto;
    display:block;
}

.titulo{
    text-align:center;
    font-weight:bold;
    text-decoration:underline;
    font-size:16px;
    line-height:90px;
}

.bloco{
    border:1px solid #000;
    padding:14px 10px 10px 10px;
    margin-top:10px;
    position:relative;
}

.bloco-titulo{
    position:absolute;
    top:-9px;
    left:12px;
    background:#fff;
    padding:0 5px;
    font-size:12px;
    font-weight:bold;
}

.linha{
    display:flex;
    gap:10px;
    margin-top:10px;
    align-items:flex-end;
    flex-wrap:wrap;
}

label{
    font-size:13px;
    white-space:nowrap;
}

input,
select{
    border:none;
    border-bottom:1px solid #000;
    background:transparent;
    height:24px;
    font-size:13px;
    padding:2px 3px;
    color:#000;
    font-family:Arial, Helvetica, sans-serif;
}

select{
    background:#fff;
}

.w-razao{
    width:370px;
}

.w-endereco{
    width:540px;
}

.w-nome{
    width:330px;
}

.w-cargo{
    width:170px;
}

.w-cpf{
    width:130px;
}

.w-data{
    width:150px;
}

.pergunta{
    margin-top:18px;
    font-size:13px;
}

.opcoes{
    display:flex;
    gap:18px;
    margin-top:12px;
    flex-wrap:wrap;
}

.opcoes label{
    display:flex;
    align-items:center;
    gap:5px;
}

.linha-texto{
    margin-top:18px;
    display:flex;
    gap:10px;
    align-items:flex-end;
    flex-wrap:wrap;
}

.linha-texto input{
    flex:1;
    min-width:250px;
}

.assinaturas{
    margin-top:22px;
}

.assinatura{
    margin-top:14px;
    display:flex;
    gap:10px;
    align-items:flex-end;
}

.traco{
    flex:1;
    border-bottom:1px solid #000;
    height:20px;
}

.dupla{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.area-botao{
    max-width:900px;
    margin:20px auto 0 auto;
    text-align:center;
}

.btn-print{
    width:100%;
    max-width:300px;
    height:40px;
    background:#000;
    color:#fff;
    border:none;
    font-size:14px;
    cursor:pointer;
}

@media print{
    @page{
        size:A4 portrait;
        margin:0;
    }

    body{
        background:#fff;
        padding:0;
        font-family:Arial, Helvetica, sans-serif;
    }

    .ficha{
        border:none;
        margin:0;
    }

    input,
    select{
        font-family:Arial, Helvetica, sans-serif;
    }

    .area-botao,
    .btn-print{
        display:none !important;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="ficha">

        <div class="topo">
            <div class="logo-box">
                <img src="LogodaMarca.png" alt="Logo">
            </div>
            <div class="titulo">Correções e lançamentos manuais</div>
        </div>

        <div class="bloco">
            <div class="bloco-titulo">DADOS DO EMPREGADOR</div>

            <div class="linha">
                <label>Razão Social:</label>
                <select class="w-razao">
                    <option>Selecionar empregador</option>
                    <option>EMPRESA 1 - CNPJ 00.000.000/0000-00</option>
                    <option>EMPRESA 2 - CNPJ 00.000.000/0000-00</option>
                    <option>EMPRESA 3 - CNPJ 00.000.000/0000-00</option>
                    <option>EMPRESA 4 - CNPJ 00.000.000/0000-00</option>
                </select>
            </div>

            <div class="linha">
                <label>Endereço:</label>
                <input type="text" class="w-endereco" value="Rua Teodoro de Beaurepaire, 34, Ipiranga, São Paulo - SP, 04279-030" readonly>
            </div>
        </div>

        <div class="bloco">
            <div class="bloco-titulo">DADOS DO TRABALHADOR</div>

            <div class="linha">
                <label>NOME DO COLABORADOR:</label>
                <select class="w-nome" onchange="preencher(this)">
                    <option value="">Selecionar</option>
                    <option value="1">LEONARDO PEREIRA GARCIA</option>
                    <option value="2">JOAO SILVA</option>
                    <option value="3">MARIA SOUZA</option>
                </select>
            </div>

            <div class="linha">
                <label>CARGO:</label>
                <input type="text" class="w-cargo cargo" readonly>

                <label>CPF:</label>
                <input type="text" class="w-cpf cpf" readonly>
            </div>
        </div>

        <div class="linha">
            <label>Data Ocorrência:</label>
            <input type="text" class="w-data" placeholder="dd/mm/aaaa">
        </div>

        <div class="pergunta">Qual registro não foi marcado</div>

        <div class="opcoes">
            <label><input type="radio" name="reg"> Entrada</label>
            <label><input type="radio" name="reg"> Saída Intervalo</label>
            <label><input type="radio" name="reg"> Retorno Intervalo</label>
            <label><input type="radio" name="reg"> Saída</label>
        </div>

        <div class="linha-texto">
            <label>Horário devido da marcação:</label>
            <input type="time">
        </div>

        <div class="linha-texto">
            <label>Justifique o motivo para a não marcação do ponto:</label>
            <input type="text">
        </div>

        <div class="assinaturas">
            <div class="assinatura">
                <span>Assinatura do colaborador:</span>
                <div class="traco"></div>
            </div>

            <div class="dupla">
                <div class="assinatura">
                    <span>Assinatura Líder:</span>
                    <div class="traco"></div>
                </div>

                <div class="assinatura">
                    <span>Assinatura RH:</span>
                    <div class="traco"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="area-botao">
    <button class="btn-print" onclick="window.print()">Imprimir</button>
</div>

<script>
function preencher(select){
    const cpf = document.querySelector(".cpf");
    const cargo = document.querySelector(".cargo");

    if(select.value === "1"){
        cpf.value = "464.629.978-00";
        cargo.value = "Motorista";
    }else if(select.value === "2"){
        cpf.value = "123.456.789-00";
        cargo.value = "Assistente";
    }else if(select.value === "3"){
        cpf.value = "987.654.321-00";
        cargo.value = "Analista";
    }else{
        cpf.value = "";
        cargo.value = "";
    }
}
</script>

</body>
</html>
